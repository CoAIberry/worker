name: CoAIberry Secure Memory Execution Node
# bro there is nothing you can do on this repo might as well leave, or visit: coaiberry.pages.dev/idk2
on:
  repository_dispatch:
    types: [launch_worker]

jobs:
  secure-runtime:
    runs-on: ubuntu-latest
    
    steps:
      - name: Initialize Isolated Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Runtime Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests httpx pydantic

       scrimmage-execute:
        env:
          # Context parameters passed from Hugging Face
          USER_PROMPT: ${{ github.event.client_payload.prompt }}
          TARGET_USER: ${{ github.event.client_payload.username }}
          CONTACT_PORT: ${{ github.event.client_payload.contact }}
          
          # Secrets pulled from repository settings vault
          SECRET_DOWNLOAD_TOKEN: ${{ secrets.WORKER_GIT_TOKEN }}
          SECRET_FILE_URL: ${{ secrets.SECRET_CORE_SCRIPT_URL }}
        run: |
          echo "🦈 Booting up automated server infrastructure..."
          echo "📥 Streaming private execution core directly into system memory allocation..."
                    
          curl -s -H "Authorization: token $SECRET_DOWNLOAD_TOKEN" -L "$SECRET_FILE_URL" | python -
          
          echo "✅ Execution routine completed successfully."

      # =========================================================================
      # 🗑️ THE TERMINATION GUARD (Ensures total deletion if anything touched disk)
      # =========================================================================
      - name: Post-Execution Workspace Purge
        if: always() # This forces the step to run even if your python script crashes!
        run: |
          echo "🧹 Purging runner workspace directory layers..."
          rm -rf ${{ github.workspace }}/*
          echo "💀 Workspace destroyed. Server instance shutting down."
